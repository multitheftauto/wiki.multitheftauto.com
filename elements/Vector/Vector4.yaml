name: Vector4
type: class
description: |
  Represents a 4D [Vector](/reference/Vector).
oop_only_methods:
  - name: create
    description: |
      Default constructor for the Vector4 class. Returns a Vector4 object.
    parameters:
      - name: vectorOrX
        type: float | table | Vector4
        description: Vector4, table, or floats indicating vector's coordinates
      - name: "y"
        type: float
        default: 0
        description: If vectorOrX is a float, this is the Y coordinate.
      - name: z
        type: float
        default: 0
        description: If vectorOrX is a float, this is the Z coordinate.
      - name: w
        type: float
        default: 0
        description: If vectorOrX is a float, this is the W coordinate.

  - name: dot
    type: method
    description: |
      Calculates the dot (scalar) product of two vectors.
    parameters:
      - name: vectorOne
        type: Vector4
        description: First vector.
      - name: vectorTwo
        type: Vector4
        description: Vector to calculate the dot product with.
    returns:
      values:
        - type: float|false
          name: dot-product
      description: The scalar dot product.

  - name: getX
    type: method
    description: Returns the X component of the vector.
    variable: x
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get X coordinate from.
    returns:
      values:
        - type: float|false
          name: x
      description: The X coordinate.

  - name: setX
    type: method
    description: Sets the X component of the vector.
    variable: x
    returns: 
      values:
        - type: bool
          name: result
      description: ''
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to set X coordinate on.
      - name: x
        type: float
        description: The new X value.

  - name: getY
    type: method
    description: Returns the Y component of the vector.
    variable: "y"
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get Y coordinate from.
    returns:
      values:
        - type: float|false
          name: 'y'
      description: The Y coordinate.

  - name: setY
    type: method
    description: Sets the Y component of the vector.
    variable: "y"
    returns: 
      values:
        - type: bool
          name: result
      description: ''
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to set Y coordinate on.
      - name: "y"
        type: float
        description: The new Y value.

  - name: getZ
    type: method
    description: Returns the Z component of the vector.
    variable: z
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get Z coordinate from.
    returns:
      values:
        - type: float|false
          name: z
      description: The Z coordinate.

  - name: setZ
    type: method
    description: Sets the Z component of the vector.
    variable: z
    returns: 
      values:
        - type: bool
          name: result
      description: ''
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to set Z coordinate on.
      - name: z
        type: float
        description: The new Z value.

  - name: getW
    type: method
    description: Returns the W component of the vector.
    variable: w
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get W coordinate from.
    returns:
      values:
        - type: float|false
          name: w
      description: The W coordinate.

  - name: setW
    type: method
    description: Sets the W component of the vector.
    variable: w
    returns: 
      values:
        - type: bool
          name: result
      description: ''
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to set W coordinate on.
      - name: w
        type: float
        description: The new W value.

  - name: normalize
    type: method
    description: |
      Normalizes the vector to a unit vector (length of 1). Modifies the original vector.
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to normalize.
    returns:
      values: 
        - type: bool
          name: result
      description: Whether the operation succeeded (e.g., the vector was not zero-length).

  - name: getNormalized
    type: method
    description: |
      Returns a normalized version of the vector without modifying the original.
    variable: normalized
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get normalized version of.
    returns:
      values: 
        - type: Vector4|false
          name: normalized vector
      description: A new normalized vector.

  - name: getLength
    type: method
    description: |
      Returns the length (magnitude) of the vector.
    variable: length
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get length from.
    returns:
      values:
        - type: float|false
          name: length
      description: The vector's length.

  - name: getSquaredLength
    type: method
    description: |
      Returns the squared length of the vector (useful to anil square root operations).
    variable: squaredLength
    parameters:
      - name: vector
        type: Vector4
        description: Vector4 to get squared length from.
    returns:
      values: 
        - type: float|false
          name: squaredLength
      description: The squared length of the vector.

examples:
  - path: examples/vector4-1.lua
    description: This example adds a command called "/garage", allowing you to get any garage bounding box. 
    side: 'client'