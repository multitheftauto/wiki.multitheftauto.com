name: gui-tabpanel
description: |
  The GUI tab panel class represents GUI tab panels in MTA's GUI system. These are just layouts for GUI [tabs](/reference/gui-tab) and highly rely on them. It is recommended to use GUI [windows](/reference/gui-window) if you are not adding tabs to a tab panel. 

preview_images: 
  - path: "GUI/tabpanel.png"
    description: Example GUI tab panel with tabs.