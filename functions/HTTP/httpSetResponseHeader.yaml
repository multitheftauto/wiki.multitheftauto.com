server:
  name: httpSetResponseHeader
  description: This function sets the value for the specified HTTP response header
    of the current HTML page.
  html: true
  parameters:
  - name: headerName
    type: string
    description: The HTTP header whose value is being set. You can find a list of header names <a href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers" target="_blank" rel="noopener noreferrer">here</a>. Header names should be all lower case letters.
  - name: headerValue
    type: string
    description: The new value for the specified header.
  examples:
  - path: examples/httpSetResponseHeader-1.html
    description: This example displays an image on the page by setting the header content-type to `image/png`.
    lang: html
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the header value was set successfully, **false** otherwise.