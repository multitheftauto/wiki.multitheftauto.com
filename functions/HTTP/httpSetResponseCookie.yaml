server:
  name: httpSetResponseCookie
  description: This function sets the value for the specified HTTP cookie of the current
    HTML page.
  html: true
  parameters:
  - name: cookieName
    type: string
    description: The HTTP cookie whose value is being set.
  - name: cookieValue
    type: string
    description: The new value for the specified cookie.
  examples:
  - path: examples/httpSetResponseCookie-1.html
    description: This example retrieves the player's `loginTime` element data, sets it as a cookie, and then displays it on the page when visiting the resource's web page.
    lang: html
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the cookie value was set successfully, **false** otherwise.
