server:
  name: httpWrite
  description: This function adds text to the output of the current HTTP file of the
    [HTTP interface](/reference/Resource_Web_Access/). The function
    can only be used on parsed (i.e not marked as **raw**) HTTP pages. **httpWrite** can
    support outputing binary data, if you specify the length of the data you are outtputing.
    If you do this, you should ensure you set an accurate content\-type using [[httpSetResponseHeader]] otherwise it may be displayed inconsistently by browsers.
  html: true
  parameters:
  - name: data
    type: string
    description: The data to be added to the page's output.
  - name: length
    type: int
    default: nil
    description: The length of the data being written. Generally only should be required
      for writing binary data.
  examples:
  - path: examples/httpWrite-1.html
    description: This sample resource page will output a random quote from
      a player using a function previously exported to http from a Lua script in the
      resource.
    lang: html
  - path: examples/httpWrite-2.html
    description: This example creates a simple [HTTP interface](/reference/Resource_Web_Access/) for a server resource. When you open the resource page in a browser, it displays the number of players currently online on the server.
    lang: html
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the text was added to the output buffer successfully,
      **false** otherwise.
  notes:
    - type: tip
      content: |
        You can use a shortened syntax, which looks like this:
        ```
          <* = text *>
        ```
        It is equivalent to:
        ```
          <* httpWrite(text) *>
        ```