client:
  name: guiGetInputEnabled
  description: This function checks whether user input is focused on the GUI or the game.
  parameters: []
  examples:
  - path: examples/guiGetInputEnabled-1.lua
    description: This example adds a command with which you can check whether the
      input is focused on GUI or game.
  - path: examples/guiGetInputEnabled_OOP-1.lua
    description: This example adds a command with which you can check whether the
      input is focused on GUI or game.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if input is focused on GUI, **false** if it's focused on
      the game.
  oop:
    element: GuiElement
    method: isInputEnabled
    variable: inputEnabled
    static: true
  pair: guiSetInputEnabled