client:
  name: guiCreateFont
  description: This function creates a gui-font element
    that can be used in [[guiSetFont]]. Successful font
    creation is not guaranteed, and may fail due to hardware or memory limitations.
  parameters:
  - name: filepath
    type: string
    description: The name of the file containing the font.
  - name: size
    type: int
    description: Size of the font.
    default: '9'
  examples:
  - path: examples/guiCreateFont-1.lua
  - path: examples/guiCreateFont_OOP-1.lua
    oop: true
  returns:
    values:
    - type: gui-font|false
      name: result
    description: Returns a GUI font element if successful, **false** if invalid arguments
      were passed to the function, or there is insufficient resources available.
  notes:
    - type: tip
      content: |
        - It is highly recommended that [[dxSetTestMode]] is used when writing and testing scripts using **guiCreateFont**.
        - You should always check to see if this function has returned **false**.
  oop:
    element: gui-font
    constructorclass: GuiFont