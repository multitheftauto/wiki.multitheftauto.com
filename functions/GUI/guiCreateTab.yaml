client:
  name: guiCreateTab
  pair: guiDeleteTab
  description: This function creates a tab on a pre\-existing tab panel. A tab is
    a button as well as a 'dimension' that can be used to switch between information
    by clicking on the tabs. Tabs are sorted on a tab panel in the order that they
    are created.
  parameters:
  - name: text
    type: string
    description: The caption for the tab.
  - name: parent
    type: gui-tabpanel
    description: The parent tab panel, as a tab panel element type.
  examples:
  - path: examples/guiCreateTab-1.lua
    description: This example creates a information window and adds two tabs to a
      "tabPanel" tabpanel, and adds some other gui elements to it.
  - path: examples/guiCreateTab_OOP-1.lua
    description: This example creates a information window and adds two tabs to a
      "tabPanel" tabpanel, and adds some other gui elements to it.
    oop: true
  returns:
    values:
    - type: gui-tab|false
      name: result
    description: Returns a tab element if successful, **false** otherwise.
  preview_images:
    - path: GUI/tabpanel.png
      description: A preview of a GUI Tab.
  oop:
    element: gui-tab
    constructorclass: GuiTab
