client:
  name: setDebugViewActive
  description: This function enables or disables the debug window. This is the debugwindow visible using the `debugscript <level>` command.
  parameters:
  - name: enabled
    type: bool
    description: Set **true** if debug window should be visible, **false** otherwise.
  examples:
  - path: examples/setDebugViewActive-1.lua
    description: This example enables or disables the debug window.
  - path: examples/setDebugViewActive_OOP-1.lua
    description: This example enables or disables the debug window.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** or **false** if invalid parameters are passed.
  oop:
    element: GuiElement
    method: setDebugViewActive
    variable: debugViewActive
    static: true
  pair: isDebugViewActive