client:
  name: guiSetSelectedTab
  pair: guiGetSelectedTab
  description: This function is used to change the currently selected tab in a tab-panel.
  parameters:
  - name: tabPanel
    type: gui-tabpanel
    description: The tab panel which current tab you want to change.
  - name: theTab
    type: gui-tab
    description: The tab which will be the new active tab.
  examples:
  - path: examples/guiSetSelectedTab-1.lua
    description: This example changes the selected tab to the next available tab.
  - path: examples/guiSetSelectedTab_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the selected tab was changed to a new one successfully,
      **false** otherwise.
  oop:
    element: gui-tabpanel
    method: setSelectedTab
    variable: selectedTab