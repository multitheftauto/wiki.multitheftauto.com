client:
  name: guiGetCursorType
  description: This function is used to get the type of the current cursor image.
  parameters: []
  examples:
  - path: examples/guiGetCursorType-1.lua
    description: This example prints the current cursor type in the console.
  - path: examples/guiGetCursorType_OOP-1.lua
    description: This example prints the current cursor type in the console.
    oop: true
  returns:
    values:
    - type: string
      name: cursor type
      templateList: cursor-types
    description: Returns a string containing the cursor type.
  oop:
    element: GuiElement
    method: getCursorType
    variable: cursorType
    static: true