client:
  name: guiMemoSetVerticalScrollPosition
  description: This function is used to set the vertical scroll position of a memo
    as a percentage.
  parameters:
  - name: theMemo
    type: gui-memo
    description: The memo you want to change the vertical scroll position of.
  - name: position
    type: float
    description: A [[float]] ranging between 0 and 100.
  examples:
  - path: examples/guiMemoSetVerticalScrollPosition-1.lua
    description: This example sets the scroll position of a memo called "theMemo" created
      with [[guiCreateMemo]], and outputs it to the chatbox.
  - path: examples/guiMemoSetVerticalScrollPosition_OOP-1.lua
    description: This example sets the scroll position of a memo called "theMemo" created
      with [[guiCreateMemo]], and outputs it to the chatbox.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the scroll position was set, **false** otherwise.
  oop:
    element: gui-memo
    method: setVerticalScrollPosition
    variable: verticalScrollPosition
    static: false
  pair: guiMemoGetVerticalScrollPosition