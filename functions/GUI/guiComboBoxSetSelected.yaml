client:
  name: guiComboBoxSetSelected
  description: This function sets the selected item of a combo box.
  parameters:
  - name: comboBox
    type: gui-combobox
    description: The combobox you want to select an item in.
  - name: itemIndex
    type: int
    description: The item you want to select (indexing starts at 0). If **-1** is
      specified, then the combo box text is set to it's caption.
  examples:
  - path: examples/guiComboBoxSetSelected-1.lua
    description: This example creates a GUI window with a checked and an unchecked
      combo box and adds a command to toggle their visibility.
  - path: examples/guiComboBoxSetSelected_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the selected item has been changed successfully,
      **false** otherwise.
  oop:
    element: gui-combobox
    method: setSelected
    variable: selected
    static: false
  pair: guiComboBoxGetSelected