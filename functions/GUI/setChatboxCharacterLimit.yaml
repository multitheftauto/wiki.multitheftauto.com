client:
  name: setChatboxCharacterLimit
  description: Sets the maximum amount of characters that can be input via chatbox.
  parameters:
  - name: charLimit
    type: int
    description: An integer between 0-255. Passing -1 will reset the character limit
      (96).
  examples:
  - path: examples/setChatboxCharacterLimit-1.lua
    description: This example shows how you can set the character limit to maximum
      when a player joins the server (assuming this resource is running when they
      join).
  - path: examples/setChatboxCharacterLimit_OOP-1.lua
    description: This example shows how you can set the character limit to maximum
      when a player joins the server (assuming this resource is running when they
      join).
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the character limit was set, **false** otherwise
  oop:
    element: GuiElement
    method: setChatboxCharacterLimit
    variable: chatboxCharacterLimit
    static: true
  pair: getChatboxCharacterLimit
