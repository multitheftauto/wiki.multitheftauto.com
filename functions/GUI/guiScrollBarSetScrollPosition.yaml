client:
  name: guiScrollBarSetScrollPosition
  pair: guiScrollBarGetScrollPosition
  description: This function is used to set the scroll amount of a scrollbar as a
    percentage.
  parameters:
  - name: theScrollBar
    type: gui-scrollbar
    description: The scrollbar you want to change the progress of.
  - name: amount
    type: float
    description: A [[float]] ranging from 0 - 100 representing the amount you wish to
      set the scroll bar.
  examples:
  - path: examples/guiScrollBarSetScrollPosition-1.lua
    description: In this example, you can set the scrolling position using the command `/pos <amount>`.
  - path: examples/guiScrollBarSetScrollPosition_OOP-1.lua
    description: In this example, you can set the scrolling position using the command `/pos <amount>`.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the scroll position was successfully set, **false** otherwise.
  oop:
    element: gui-scrollbar
    method: setScrollPosition
    variable: scrollPosition