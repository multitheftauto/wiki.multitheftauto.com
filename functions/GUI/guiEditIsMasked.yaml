client:
  name: guiEditIsMasked
  description: This function checks if an edit box is masked.
  parameters:
  - name: guiEdit
    type: gui-edit
    description: The edit box to check masked flag of.
  examples:
  - path: examples/guiEditIsMasked-1.lua
  - path: examples/guiEditIsMasked_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the edit box is masked, **false** if not, [[nil]] if an invalid
      edit box was provided.
  oop:
    element: gui-edit
    method: ''
    variable: masked
  pair: guiEditSetMasked