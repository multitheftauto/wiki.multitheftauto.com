client:
  name: guiWindowIsSizable
  description: This function checks if a GUI window is sizable.
  parameters:
  - name: guiWindow
    type: gui-window
    description: The window to check the sizable flag of.
  examples:
  - path: examples/guiWindowIsSizable-1.lua
  - path: examples/guiWindowIsSizable_OOP-1.lua
    description: This example creates a window whose resizability can be toggled with the L key.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the window is sizable, **false** if not, [[nil]] if an invalid
      window was provided.
  oop:
    element: gui-window
    method: isSizable
    variable: sizable
  pair: guiWindowSetSizable
