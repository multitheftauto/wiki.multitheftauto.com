client:
  name: guiGetInputMode
  description: 'This function returns the current input mode as set by [[guiSetInputMode]].
    Default mode is `allow_binds`.'
  parameters: []
  examples:
  - path: examples/guiGetInputMode-1.lua
  - path: examples/guiGetInputMode_OOP-1.lua
    oop: true
  returns:
    values:
    - type: string
      name: input mode
      templateList: input-modes
    description: Returns a string defining the current input mode.
  oop:
    element: GuiElement
    method: getInputMode
    variable: inputMode
    static: true
  notes:
    - type: info
      content: |
        This function is **not** a replacement of [[guiGetInputEnabled]], indeed for the mode `no_binds_when_editing` the actual state of binds depends on the currently focused GUI widget.
        
        - When [[guiGetInputMode]] returns `allow_binds` you can be sure that [[guiGetInputEnabled]] will return **false**.
        - When [[guiGetInputMode]] returns `no_binds` you can be sure that [[guiGetInputEnabled]] will return **true**.
  pair: guiSetInputMode
