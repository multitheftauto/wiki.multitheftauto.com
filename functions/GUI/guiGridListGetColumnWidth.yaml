client:
  name: guiGridListGetColumnWidth
  pair: guiGridListSetColumnWidth
  description: This allows you to get the width of an existing column in a gridlist.
  parameters:
  - name: gridList
    type: gui-gridlist
    description: The grid list whose column width you want to get.
  - name: columnIndex
    type: int
    description: Column ID. Indexes start at 1.
  - name: relative
    type: bool
    description: A boolean defining whether width measurements will be relative to
      the gridlist size, or absolute pixels.
    default: 'false'
  examples:
  - path: examples/guiGridListGetColumnWidth-1.lua
  - path: examples/guiGridListGetColumnWidth_OOP-1.lua
    oop: true
  returns:
    values:
    - type: float|false
      name: column width
    description: Returns the width of the gridlist column, **false** if bad arguments
      were given.
  oop:
    element: gui-gridlist
    method: getColumnWidth
    static: false
