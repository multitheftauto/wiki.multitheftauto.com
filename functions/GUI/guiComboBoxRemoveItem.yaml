client:
  name: guiComboBoxRemoveItem
  pair: guiComboBoxAddItem
  description: This function removes an item from a combobox.
  parameters:
  - name: comboBox
    type: gui-combobox
    description: The combobox containing the item you're interested in.
  - name: itemId
    type: int
    description: The index of the item to remove. Indexing starts at 0.
  examples:
  - path: examples/guiComboBoxRemoveItem-1.lua
    description: This example removes selected item.
  - path: examples/guiComboBoxRemoveItem_OOP-1.lua
    description: This example removes player's name from the list when they leave the server.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the item was removed successfully, **false** otherwise.
  oop:
    element: gui-combobox
    method: removeItem
    static: false
