client:
  name: guiScrollPaneSetVerticalScrollPosition
  pair: guiScrollPaneGetVerticalScrollPosition
  description: This function is used to set the position of a vertical scroll pane
    as a percentage.
  parameters:
  - name: verticalScrollPane
    type: gui-scrollpane
    description: The scroll pane you want to change the position of.
  - name: position
    type: float
    description: A [[float]] ranging from 0 - 100.
  examples:
  - path: examples/guiScrollPaneSetVerticalScrollPosition-1.lua
  - path: examples/guiScrollPaneSetVerticalScrollPosition_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the position was set, **false** otherwise.
  oop:
    element: gui-scrollpane
    method: setVerticalScrollPosition
    variable: verticalScrollPosition