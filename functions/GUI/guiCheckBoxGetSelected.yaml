client:
  name: guiCheckBoxGetSelected
  description: This function gets a checkbox's selection state.
  parameters:
  - name: theCheckbox
    type: gui-checkbox
    description: The checkbox you wish to retrieve the selection state of.
  examples:
  - path: examples/guiCheckBoxGetSelected-1.lua
    description: This example makes a different beep based on the state when any checkbox
      has been clicked.
  - path: examples/guiCheckBoxGetSelected_OOP-1.lua
    description: This example makes a different beep based on the state when any checkbox
      has been clicked.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the checkbox is selected, **false** if it is not.
  oop:
    element: gui-checkbox
    method: getSelected
    variable: selected
    static: false
  pair: guiCheckBoxSetSelected