client:
  name: getChatboxLayout
  description: |
    Returns information about how the chatbox looks.
  parameters:
  - name: CVar
    type: string
    default: nil
    description: The name of the property you want returned.
    templateList: chatbox-presets
  examples:
  - path: examples/getChatboxLayout-1.lua
    description: This code makes the chatbox empty when you type `/clear`.
  - path: examples/getChatboxLayout-2.lua
    description: This code makes the chatbox empty when you type `/clear`, but with
      a cleaner code.
  returns:
    values:
    - type: mixed
      name: result
    description: |
      - A [[table]] of all **CVar** values, if **CVar** was not specified.
      - A [[bool]] if `chat_use_cegui` was entered.
      - A [[number]](s) if any other CVar was specified.
      - **false** if an invalid CVar was specified.

      Returns a bool, table or number.
