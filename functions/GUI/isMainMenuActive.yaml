client:
  name: isMainMenuActive
  description: This function returns whether the user is in the mainmenu or not.
  parameters: []
  examples:
  - path: examples/isMainMenuActive-1.lua
    description: This example counts how many seconds you have the menu open and displays the result after it is closed.
  - path: examples/isMainMenuActive_OOP-1.lua
    description: This example counts how many seconds you have the menu open and displays the result after it is closed.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the mainmenu is visible, **false** if not.
  oop:
    element: GuiElement
    method: isMainMenuActive
    variable: mainMenuActive
    static: true