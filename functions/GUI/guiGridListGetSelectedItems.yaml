client:
  name: guiGridListGetSelectedItems
  description: This function returns the items selected in the specified grid list.
  parameters:
  - name: gridList
    type: gui-gridlist
    description: The grid list which selected items you want to retrieve.
  examples: 
    - path: examples/guiGridListGetSelectedItems-1.lua
    - path: examples/guiGridListGetSelectedItems_OOP-1.lua
      oop: true
  returns:
    values:
    - type: table|false
      name: selected items
    description: |
      Returns a [[table]] over the selected items in the grid list if everything was successful or **false** if invalid arguments were passed.

      Table format:
      ```lua
      table = {
          [1] = {
              ["column"], -- has the first selected item's column ID
              ["row"] -- has the first selected item's row ID
          },
          [2] = {
              ["column"],-- has the second selected item's column ID
              ["row"] -- has the second selected item's row ID
          },
          ...
      }
      ```


  oop:
    element: gui-gridlist
    method: getSelectedItems
    variable: selectedItems
    static: false
