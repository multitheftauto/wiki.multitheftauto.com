client:
  name: guiGetEnabled
  description: This function determines whether a GUI element is enabled. Elements that are disabled do not respond to user interaction; for example, a button that is disabled cannot be clicked and appears grayed out.
  parameters:
  - name: guiElement
    type: gui-element
    description: The GUI element to be checked.
  examples:
  - path: examples/guiGetEnabled-1.lua
  - path: examples/guiGetEnabled_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the element is enabled, **false** otherwise.
  oop:
    element: gui-element
    method: getEnabled
    variable: enabled
    static: false
  preview_images:
    - path: GUI/disabled_enabled.png
      description: Example of disabled gui widgets.
  pair: guiSetEnabled