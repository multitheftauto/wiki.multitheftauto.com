client:
  name: guiCreateScrollBar
  description: This function creates a GUI scrollbar. You can use the functions [[guiScrollBarSetScrollPosition]] and [[guiScrollBarGetScrollPosition]] to read and modify the scrollbar's scroll.
  parameters:
  - name: x
    type: float
    description: The 2D x offset of the GUI scrollbar from its parent. This is affected
      by the relative argument.
  - name: "y"
    type: float
    description: The 2D y offset of the GUI scrollbar from its parent. This is affected
      by the relative argument.
  - name: width
    type: float
    description: The width of the GUI scrollbar. This is affected by the relative
      argument.
  - name: height
    type: float
    description: The height of the GUI scrollbar. This is affected by the relative
      argument.
  - name: horizontal
    type: bool
    description: Whether this scrollbar is horizontal (true) or vertical (false).
  - name: relative
    type: bool
    description: This is whether sizes and positioning are relative. If this is **true**, then all x, y, width, height floats must be between 0 and 1, representing measures
      relative to the parent.
    default: 'false'
  - name: parent
    type: gui-element
    description: This is the parent that the scrollbar is attached to. If the `relative`
      argument is **true**, sizes and positioning will be made relative to this parent.
      If the `relative` argument is **false**, positioning will be the number of offset
      pixels from the parent's origin. If no parent is passed, the parent will become
      the screen - causing positioning and sizing according to screen positioning.
    default: nil
  examples:
  - path: examples/guiCreateScrollBar-1.lua
  - path: examples/guiCreateScrollBar_OOP-1.lua
    oop: true
  returns:
    values:
    - type: gui-scrollbar|false
      name: result
    description: Returns a gui-scrollbar if it was created successfully, **false** otherwise.
  oop:
    element: gui-scrollbar
    constructorclass: GuiScrollBar
  preview_images:
    - path: GUI/scrollbar.png
      description: A preview of a GUI ScrollBar.