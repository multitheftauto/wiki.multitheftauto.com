client:
  name: guiStaticImageGetNativeSize
  description: This function gets the native size of image. That means the original
    size in pixels of the image file.
  parameters:
  - name: theImage
    type: gui-staticimage
    description: The static image element to get the original size of.
  examples:
  - path: examples/guiStaticImageGetNativeSize-1.lua
    description: This example creates an image at the resource's start and changes
      its size to the original size so it keeps the best quality.
  - path: examples/guiStaticImageGetNativeSize-1.lua
    oop: true
  returns:
    values:
    - type: int
      name: width
    - type: int
      name: height
    description: Returns two integers where first is the width and second the height
      of the image in pixels, **false** if the image element was invalid.
  oop:
    element: gui-staticimage
    method: getNativeSize