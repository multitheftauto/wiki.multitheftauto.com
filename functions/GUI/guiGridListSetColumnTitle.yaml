client:
  name: guiGridListSetColumnTitle
  pair: guiGridListGetColumnTitle
  description: This function is used to change the column title of a gridlist column.
  parameters:
  - name: guiGridlist
    type: gui-gridlist
    description: The grid list you want to change the column title for.
  - name: columnIndex
    type: int
    description: Column ID. Indexes start at 1.
  - name: title
    type: string
    description: The title of the column.
  examples:
  - path: examples/guiGridListSetColumnTitle-1.lua
  - path: examples/guiGridListSetColumnTitle_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the new title was set, or **false** otherwise.
  oop:
    element: gui-gridlist
    method: setColumnTitle
    static: false
