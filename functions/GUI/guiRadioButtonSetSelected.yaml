client:
  name: guiRadioButtonSetSelected
  description: This function selects or unselects a radio button.
  parameters:
  - name: guiRadioButton
    type: gui-radiobutton
    description: The GUI radio button in which you wish to change the selection state of.
  - name: state
    type: bool
    description: The state of the radio button, where **true** indicates selected, and
      **false** indicates unselected.
  examples:
  - path: examples/guiRadioButtonSetSelected-1.lua
  - path: examples/guiRadioButtonSetSelected_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the radio button's selection state was successfully set, **false** otherwise.
  oop:
    element: gui-radiobutton
    method: setSelected
    variable: selected
    static: false
  pair: guiRadioButtonGetSelected