client:
  name: guiGridListSetItemData
  pair: guiGridListGetItemData
  description: This function sets a item data associated to a grid list item.
  parameters:
  - name: gridList
    type: gui-gridlist
    description: A gridlist element of the data you wish to set to.
  - name: rowIndex
    type: int
    description: The row of the item you wish to set to. Indexes start at 0.
  - name: columnIndex
    type: int
    description: The column of the item you wish to set to. Indexes start at 1.
  - name: data
    type: var
    description: The data you wish to set to the item.
  examples:
  - path: examples/guiGridListSetItemData-1.lua
    description: In this example, the gridlist shows the list of players without their
      color codes and outputs their names with color-codes at the chatbox when player
      is selected.
  - path: examples/guiGridListSetItemData_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the data was set successfully, **false** otherwise
  oop:
    element: gui-gridlist
    method: setItemData
    static: false
  notes:
    - type: info
      content: This function will only work after you set the item's text using [[guiGridListSetItemText]].