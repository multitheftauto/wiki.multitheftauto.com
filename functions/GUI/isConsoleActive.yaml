client:
  name: isConsoleActive
  description: This function returns whether the ingame console window is visible
    or not.
  parameters: []
  examples:
  - path: examples/isConsoleActive-1.lua
  - path: examples/isConsoleActive_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the console is visible, **false** if not.
  oop:
    element: GuiElement
    method: isConsoleActive
    variable: consoleActive
    static: true