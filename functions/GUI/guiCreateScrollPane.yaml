client:
  name: guiCreateScrollPane
  description: This creates a GUI scroll pane.
  parameters:
  - name: x
    type: float
    description: The 2D x offset of the GUI scrollpane from its parent. This is affected
      by the relative argument.
  - name: "y"
    type: float
    description: The 2D y offset of the GUI scrollpane from its parent. This is affected
      by the relative argument.
  - name: width
    type: float
    description: The width of the GUI scrollpane. This is affected by the relative
      argument.
  - name: height
    type: float
    description: The height of the GUI scrollpane. This is affected by the relative
      argument.
  - name: relative
    type: bool
    description: This is whether sizes and positioning are relative. If this is **true**, then all x, y, width and height floats must be between 0 and 1, representing
      sizes relative to the parent.
    default: 'false'
  - name: parent
    type: gui-element
    description: This is the parent that the gui scrollpane is attached to. If the `relative`
      argument is **true**, sizes and positioning will be made relative to this parent.
      If the `relative` argument is **false**, positioning will be the number of offset
      pixels from the parent's origin. If no parent is passed, the parent will become
      the screen - causing positioning and sizing according to screen positioning.
    default: nil
  examples:
  - path: examples/guiCreateScrollPane-1.lua
    description: This example creates a small window with a scrollpane on. Using the
      `/fill` command you can populate the scrollpane with the names of every player
      in the server.
  - path: examples/guiCreateScrollPane_OOP-1.lua
    description: This example creates a small window with a scrollpane on. Using the
      `/fill` command you can populate the scrollpane with the names of every player
      in the server.
    oop: true
  returns:
    values:
    - type: gui-scrollpane|false
      name: result
    description: The gui-scrollpane if created, otherwise **false**.
  oop:
    element: gui-scrollpane
    constructorclass: GuiScrollPane
  preview_images:
    - path: GUI/scrollpane.png
      description: A preview of a GUI ScrollPane.