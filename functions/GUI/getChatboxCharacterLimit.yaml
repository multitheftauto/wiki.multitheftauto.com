client:
  name: getChatboxCharacterLimit
  description: Gets the current maximum amount of characters that can be input via
    chatbox.
  parameters: []
  examples:
  - path: examples/getChatboxCharacterLimit-1.lua
    description: This example shows how you can check your current chatbox character
      limit via command.
  - path: examples/getChatboxCharacterLimit_OOP-1.lua
    description: This example shows how you can check your current chatbox character
      limit via command.
    oop: true
  returns:
    values:
    - type: int
      name: limit
    description: Returns a number between 0-255, representing the chatbox input character limit.
  oop:
    element: GuiElement
    method: getChatboxCharacterLimit
    variable: chatboxCharacterLimit
    static: true
  pair: setChatboxCharacterLimit
