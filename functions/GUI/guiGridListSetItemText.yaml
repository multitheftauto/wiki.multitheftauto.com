client:
  name: guiGridListSetItemText
  pair: guiGridListGetItemText
  description: This function changes the text of a gridlist item.
  parameters:
  - name: gridList
    type: gui-gridlist
    description: The grid list element.
  - name: rowIndex
    type: int
    description: Row ID. Indexes start at 0.
  - name: columnIndex
    type: int
    description: Column ID. Indexes start at 1.
  - name: text
    type: string
    description: The text you want to set.
  - name: section
    type: bool
    description: Determines if the item is a section (bold, non-clickable item).
  - name: number
    type: bool
    description: Tells whether the text item is a number value or not (used for sorting).
  examples:
  - path: examples/guiGridListSetItemText-1.lua
    description: This example creates a player list on the right of the screen and fills it.
  - path: examples/guiGridListSetItemText_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the item text was set successfully, **false** otherwise.
  oop:
    element: gui-gridlist
    method: setItemText
    static: false
  preview_images:
    - path: GUI/gridlist-section.png
      description: Example grid list with sections.