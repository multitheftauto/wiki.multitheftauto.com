client:
  name: guiScrollPaneGetVerticalScrollPosition
  pair: guiScrollPaneSetVerticalScrollPosition
  description: This function is used to get the position of a vertical scroll pane
    as a percentage.
  parameters:
  - name: verticalScrollPane
    type: gui-scrollpane
    description: The scroll pane you want to know the position of.
  examples:
  - path: examples/guiScrollPaneGetVerticalScrollPosition-1.lua
  - path: examples/guiScrollPaneGetVerticalScrollPosition_OOP-1.lua
    oop: true
  returns:
    values:
    - type: float|false
      name: Vertical scroll position
    description: Returns a [[float]] ranging between 0 and 100, or **false** otherwise.
  oop:
    element: gui-scrollpane
    method: getVerticalScrollPosition
    variable: verticalScrollPosition