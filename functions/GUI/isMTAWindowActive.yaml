client:
  name: isMTAWindowActive
  description: This function returns whether any system windows that take focus are
    active. This includes chatbox input, console window, main menu and transfer box.
  parameters: []
  examples:
  - path: examples/isMTAWindowActive-1.lua
    description: This piece of script will kill a player if he has any of the above
      system windows open.
  - path: examples/isMTAWindowActive_OOP-1.lua
    description: This piece of script will kill a player if he has any of the above
      system windows open.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the focus is on the MTA window, **false** if it isn't.
  oop:
    element: GuiElement
    method: isMTAWindowActive
    variable: mtaWindowActive
    static: true
  notes:
  - type: info
    content: You cannot rely on this function to get the focus state of the MTA window
      - use [[isMTAWindowFocused]] instead.