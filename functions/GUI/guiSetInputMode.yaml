client:
  name: guiSetInputMode
  description: This function controls the input mode to define whether or not (and
    when) keybinds or MTA binds are overridden (disabled) so that text can be input
    into an editbox, for example.
  parameters:
  - name: mode
    type: string
    description: A [[string]] representing the desired input mode.
    templateList: input-modes
  examples:
  - path: examples/guiSetInputMode-1.lua
  - path: examples/guiSetInputMode_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if input mode could be changed, **false** if invalid parameters
      are passed.
  oop:
    element: GuiElement
    method: setInputMode
    variable: inputMode
    static: true
  notes:
    - type: info
      content: |
        This function **can be** used as a replacement of [[guiSetInputEnabled]] since it provides the same functionality with one added feature.

        - `guiSetInputEnabled(false)` is the same as `guiSetInputMode("allow_binds")`.
        - `guiSetInputEnabled(true)` is the same as `guiSetInputMode("no_binds")`.
  pair: guiGetInputMode