client:
  name: guiGridListSetSelectedItem
  pair: guiGridListGetSelectedItem
  description: This function selects an item from a gridlist. If you wish to deselect
    whatever item is selected, pass **0** as both the `rowIndex` and `columnIndex` arguments.
  parameters:
  - name: gridList
    type: gui-gridlist
    description: The grid list you want to select an item in.
  - name: rowIndex
    type: int
    description: The row you want to select. Indexes start at 0.
  - name: columnIndex
    type: int
    description: The column you want to select. Indexes start at 1.
  - name: bReset
    type: bool
    description: Set to **false** for multiple selections.
    default: 'true'
  examples: []
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the passed arguments are correct and the item has
      been selected, **false** otherwise.
  oop:
    element: gui-gridlist
    method: setSelectedItem
    static: false
