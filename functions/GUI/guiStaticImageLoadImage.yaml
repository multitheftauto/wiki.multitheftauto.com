client:
  name: guiStaticImageLoadImage
  description: This function allows you to change the image in GUI static image element
    to another one.
  parameters:
  - name: theElement
    type: gui-staticimage
    description: The static image element to be changed.
  - name: filename
    type: string
    description: A string specifying the [filepath](/reference/Filepath) of the image file being loaded in
      current resource.
  examples:
  - path: examples/guiStaticImageLoadImage-1.lua
    description: This example creates a static image `myimage.png` and replaces
      it with other image `otherimage.png` 10 seconds after creation.
  - path: examples/guiStaticImageLoadImage_OOP-1.lua
    description: This example creates a static image `myimage.png` and replaces
      it with other image `otherimage.png` 10 seconds after creation.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the the image in the static image element was successfully
      changed, **false** otherwise.
  oop:
    element: gui-staticimage
    method: loadImage
    variable: image
    static: false
  notes:
    - type: tip
      content: If you set other images as children you will have to use [[setElementCallPropagationEnabled]] to only affect the parent image.