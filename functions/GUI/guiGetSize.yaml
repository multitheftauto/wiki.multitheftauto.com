client:
  name: guiGetSize
  description: This function gets the size of a GUI element.
  parameters:
  - name: theElement
    type: gui-element
    description: The GUI element to get size of.
  - name: relative
    type: bool
    description: A boolean representing whether the size should be relative to the
      element's parent width, or an absolute size in pixels.
    default: 'false'
  examples:
  - path: examples/guiGetSize-1.lua
    description: This example creates a random sized gui window and outputs its size
      to the chatbox.
  - path: examples/guiGetSize_OOP-1.lua
    oop: true
  returns:
    values:
    - type: float|false
      name: width
    - type: float
      name: height
    description: Returns the GUI element size width and height if the function has been successful,
      **false** otherwise.
  oop:
    element: gui-element
    method: getSize
    variable: size
    static: false
  pair: guiSetSize
