client:
  name: guiGridListGetItemText
  pair: guiGridListSetItemText
  description: This function retrieves the text from a specific grid list item.
  parameters:
  - name: gridList
    type: gui-gridlist
    description: The gridlist containing the item you're interested in.
  - name: rowIndex
    type: int
    description: Row ID of the item. Indexes start at 0.
  - name: columnIndex
    type: int
    description: Column ID of the item. Indexes start at 1.
  examples:
  - path: examples/guiGridListGetItemText-1.lua
    description: 'This example creates a player list on resource start,
      clicking on it will output the selected player name to the chatbox.'
  - path: examples/guiGridListGetItemText_OOP-1.lua
    description: 'This example creates a player list on resource start,
      clicking on it will output the selected player name to the chatbox.'
    oop: true
  returns:
    values:
    - type: string|false
      name: item text
    description: Returns the text of the item if the arguments are right, **false** otherwise.
  oop:
    element: gui-gridlist
    method: getItemText
    static: false
