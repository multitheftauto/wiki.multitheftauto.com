client:
  name: guiSetEnabled
  description: This function enables/disables a GUI element. A disabled GUI element
    can't be used, gets a gray aspect and doesn't receive any events.
  parameters:
  - name: guiElement
    type: gui-element
    description: The GUI element you wish to enable or disable.
  - name: enabled
    type: bool
    description: The new state.
  examples:
  - path: examples/guiSetEnabled-1.lua
  - path: examples/guiSetEnabled_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: If the function succeeds it returns **true**, if it fails it returns
      **false**.
  oop:
    element: gui-element
    method: setEnabled
    variable: enabled
    static: false
  preview_images:
    - path: GUI/disabled_enabled.png
      description: Example of disabled gui widgets.
  pair: guiGetEnabled