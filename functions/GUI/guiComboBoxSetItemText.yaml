client:
  name: guiComboBoxSetItemText
  pair: guiComboBoxGetItemText
  description: This function changes the text of a combobox item.
  parameters:
  - name: comboBox
    type: gui-combobox
    description: The combobox containing the item you're interested in.
  - name: itemId
    type: int
    description: The index of the item. Indexing starts at 0.
  - name: text
    type: string
    description: The text you want to set for the item.
  examples:
  - path: examples/guiComboBoxSetItemText-1.lua
    description: This changes the text of the selected item using command `setText`.
  - path: examples/guiComboBoxSetItemText_OOP-1.lua
    description: This updates the player's name on the list when they change it in the settings menu.
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if the text was set successfully, **false** otherwise.
  oop:
    element: gui-combobox
    method: setItemText
    static: false