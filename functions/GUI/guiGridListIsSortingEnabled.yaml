client:
  name: guiGridListIsSortingEnabled
  pair: guiGridListSetSortingEnabled
  description: This function checks whether the gridlist sorting is enabled or disabled.
  parameters:
  - name: guiGridlist
    type: gui-gridlist
    description: The GUI gridlist you wish to check if sorting is enabled or not.
  examples:
  - path: examples/guiGridListIsSortingEnabled-1.lua
    description: This example creates a gridlist with all server players
      and adds a command that enables and disables the gridlist sorting.
  - path: examples/guiGridListIsSortingEnabled_OOP-1.lua
    oop: true
  returns:
    values:
    - type: bool
      name: result
    description: Returns **true** if sorting is enabled, **false** otherwise. Returns [[nil]] if invalid gridlist element was passed.
  oop:
    element: gui-gridlist
    method: isSortingEnabled
    variable: sortingEnabled
    static: false